[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read", path = "./out" }]

[profile.default.fuzz]
runs = 256

[profile.ci]
fuzz = { runs = 1024 }
verbosity = 3

[rpc_endpoints]
mantle_sepolia = "${MANTLE_SEPOLIA_RPC}"
mantle = "${MANTLE_RPC}"
local = "http://127.0.0.1:8545"

[etherscan]
mantle_sepolia = { key = "${MANTLESCAN_KEY}", url = "https://api-sepolia.mantlescan.xyz/api" }
mantle = { key = "${MANTLESCAN_KEY}", url = "https://api.mantlescan.xyz/api" }
