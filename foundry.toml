[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [
    { access = "read",       path = "./out" },
    { access = "read",       path = "./pyth_update.json" },
    { access = "read-write", path = "./deployments" },
]

[profile.default.fuzz]
runs = 256

[profile.ci]
fuzz = { runs = 1024 }
verbosity = 3

[rpc_endpoints]
mantle_sepolia = "${MANTLE_SEPOLIA_RPC}"
mantle = "${MANTLE_RPC}"
local = "http://127.0.0.1:8545"

[etherscan]
mantle_sepolia = { key = "${MANTLESCAN_KEY}", chain = 5003, url = "https://api.etherscan.io/v2/api?chainid=5003" }
mantle = { key = "${MANTLESCAN_KEY}", chain = 5000, url = "https://api.etherscan.io/v2/api?chainid=5000" }